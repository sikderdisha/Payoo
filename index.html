<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Tailwind + daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome link  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto bg-base-200">
    <!-- logo  -->
    <div class="logo pt-[100px] w-[200px] mx-auto">
      <img src="./assets/Logo-full.png" alt="logo img" />
    </div>
    <!-- log in form  -->
    <div class="form pt-12 rounded-3xl">
      <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-[16px] font-bold text-black"
              >Mobile Number</label
            >
            <input
              id="input-number"
              type="text"
              class="input bg-base-200 rounded-full"
              placeholder="01543896583"
              maxlength="11"
              minlength="11"
            />
            <label class="label text-[16px] font-bold text-black"
              >4 Digit Pin</label
            >
            <input
              id="pin"
              type="password"
              class="input bg-base-200 rounded-full"
              placeholder="Enter 4 Digit Pin"
              maxlength="4"
              minlength="4"
            />
            <button
              id="btn-login"
              class="btn btn-primary mt-4 rounded-full text-[16px]"
            >
              Login
            </button>
          </fieldset>
        </div>
      </div>
    </div>

    <!-- scripts  -->
    <script src="./scripts/login.js"></script>
  </body>
</html>
