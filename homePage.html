<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | HomePage</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- Tailwind + daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts link  -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome link  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>

</head>
<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <!-- header part  -->
    <header class="flex justify-between items-center border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between">
            <!-- logo  -->
            <div class="logo flex gap-3">
            <img src="./assets/logo.png" alt="" class="w-[60px]">
 <!-- balance  -->
            <div class="balance">
                <h1 class="font-bold text-2xl">
                    <span>$ 4500</span>
                </h1>
                <p class="text-neutral/50">Available Balance</p>
            </div>

        </div>

        <!-- logout  -->
        <div class="logout btn bg-soft text-neutral/50">
    <a href="./index.html">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Log out
    </a>
</div>
</section>
       
    </header>
<!-- main  -->
    <main>
        <!-- welcome  -->
         <section class="w-11/12 mx-auto text py-7 space-y-5 rounded-3xl ">
            <h1 class="text-3xl px-4 font-bold">Welcome to Pay<span class="text-primary">oo</span></h1>
            <p class="px-4 text-neutral/50">Enjoy easy and convenient financial services with us. Cash out charge is low and transactions are fast and secure.</p>

            <!-- buttons  -->
             <div class="button grid grid-cols-3 gap-3 grid-rows-2 mx-3">
                <button class="btn h-auto p-4 flex flex-col bg-primary-content text-primary">
                    <img src="./assets/opt-1.png" alt="">
                    <h2>Add Money</h2>
                </button>
                <button class="btn h-auto p-4 flex flex-col bg-primary-content text-primary">
                    <img src="./assets/opt-2.png" alt="">
                    <h2>Cash out</h2>
                </button>
               <button class="btn h-auto p-4 flex flex-col bg-primary-content text-primary">
                    <img src="./assets/opt-3.png" alt="">
                    <h2>Transfer Money</h2>
                </button>
                <button class="btn h-auto p-4 flex flex-col bg-primary-content text-primary">
                    <img src="./assets/opt-4.png" alt="">
                    <h2>Get Bonus</h2>
                </button>
               <button class="btn h-auto p-4 flex flex-col text-primary bg-primary-content">
                    <img src="./assets/opt-5.png" alt="">
                    <h2>Pay Bill</h2>
                </button>
                <button class="btn h-auto p-4 flex flex-col bg-primary-content text-primary">
                    <img src="./assets/opt-5.png" alt="">
                    <h2>Transactions</h2>
                </button>
             </div>
        </section>
 
        <!-- payment  -->
        <section class="w-11/12 mx-auto py-4">
            <div class="payment flex justify-between">
                <div>
                    <h1 class="text-xl px-4 font-bold">Latest Payment</h1>
                </div>
                <div>
                    <button class="btn text-neutral/50 bg-soft">View All</button>
                </div>

            </div>
            <!-- options  -->
            <div class="options space-y-2 flex flex-col mx-3">
                <!-- button 1 -->
                <button class="btn h-auto w-[100%] bg-primary-content flex justify-between">
                    <div class="flex gap-3 p-3 items-center">
                        <div>
                            <img src="./assets/opt-1.png" alt="" class=" bg-base-100 rounded-full p-[10px]">
                        </div>
                        <div class="felx flex-col">
                            <h1 class="text-xl">Electricity Bill</h1>
                            <p class="text-neutral/50 text-left">Today 01:44 AM</p>
                        </div>

                    </div>
                    <div>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>

                </button>
                <!-- button 2 -->
                <button class="btn h-auto w-[100%] bg-primary-content flex justify-between">
                    <div class="flex gap-3 p-3 items-center">
                        <div>
                            <img src="./assets/opt-1.png" alt="" class=" bg-base-100 rounded-full p-[10px]">
                        </div>
                        <div class="felx flex-col">
                            <h1 class="text-xl">Bank Deposit</h1>
                            <p class="text-neutral/50 text-left">Today 02:20 AM</p>
                        </div>

                    </div>
                    <div>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>

                </button>
                
                <!-- button 3 -->
                <button class="btn h-auto w-[100%] bg-primary-content flex justify-between">
                    <div class="flex gap-3 p-3 items-center">
                        <div>
                            <img src="./assets/opt-1.png" alt="" class=" bg-base-100 rounded-full p-[10px]">
                        </div>
                        <div class="felx flex-col">
                            <h1 class="text-xl">Mobile Recharge</h1>
                            <p class="text-neutral/50 text-left">Today 02:44 AM</p>
                        </div>

                    </div>
                    <div>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>

                </button>

                <!-- button 4 -->
                <button class="btn h-auto w-[100%] bg-primary-content flex justify-between">
                    <div class="flex gap-3 p-3 items-center">
                        <div>
                            <img src="./assets/opt-1.png" alt="" class=" bg-base-100 rounded-full p-[10px]">
                        </div>
                        <div class="felx flex-col">
                            <h1 class="text-xl">Gas Bill</h1>
                            <p class="text-neutral/50 text-left">Today 03:44 AM</p>
                        </div>

                    </div>
                    <div>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>

                </button>

            </div>

        </section>
    </main>
</body>
</html>
