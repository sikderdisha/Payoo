<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | HomePage</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Tailwind + daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome link  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto bg-base-200">
    <!-- header part  -->
    <header
      class="flex justify-between items-center border-b-2 border-gray-300 sticky top-0 bg-base-200 z-50"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between">
        <!-- logo  -->
        <div class="logo flex gap-3">
          <img src="./assets/logo.png" alt="" class="w-[60px]" />
          <!-- balance  -->
          <div class="balance">
            <h1 class="font-bold text-2xl">
              $
              <span id="balance">4500</span>
            </h1>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>

        <!-- logout  -->
        <div class="logout btn bg-soft text-neutral/50">
          <a href="./index.html">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log out
          </a>
        </div>
      </section>
    </header>
    <!-- main  -->
    <main>
      <!-- welcome  -->
      <section class="w-11/12 mx-auto text py-7 space-y-5 rounded-3xl">
        <h1 class="text-3xl px-4 font-bold">
          Welcome to Pay<span class="text-primary">oo</span>
        </h1>
        <p class="px-4 text-neutral/50">
          Enjoy easy and convenient financial services with us. Cash out charge
          is low and transactions are fast and secure.
        </p>

        <!-- buttons  -->

        <!-- add money  -->
        <div class="button grid grid-cols-3 gap-3 grid-rows-2 mx-3">
          <button
            onclick="showOnly('add-money')"
            class="btn h-auto p-4 flex flex-col bg-primary-content text-primary"
          >
            <img src="./assets/opt-1.png" alt="" />
            <h2>Add Money</h2>
          </button>
        
          <!-- cash out button  -->
          <button
            onclick="showOnly('cash-out')"
            class="btn h-auto p-4 flex flex-col bg-primary-content text-primary"
          >
            <img src="./assets/opt-2.png" alt="" />
            <h2>Cash out</h2>
          </button>


          <!-- transfer money  -->
          <button  onclick="showOnly('send-money')"
            id="moneyTrans"
            class="btn h-auto p-4 flex flex-col bg-primary-content text-primary"
          >
            <img src="./assets/opt-3.png" alt="" />
            <h2>Transfer Money</h2>
          </button>

          <!-- bonus  -->
          <button onclick="showOnly('bonus')"
            class="btn h-auto p-4 flex flex-col bg-primary-content text-primary"
          >
            <img src="./assets/opt-4.png" alt="" />
            <h2>Get Bonus</h2>
          </button>

          <button onclick="showOnly('pay-bill')"
            class="btn h-auto p-4 flex flex-col text-primary bg-primary-content"
          >
            <img src="./assets/opt-5.png" alt="" />
            <h2>Pay Bill</h2>
          </button>

          <button onclick="showOnly('transaction')"
            class="btn h-auto p-4 flex flex-col bg-primary-content text-primary"
          >
            <img src="./assets/opt-5.png" alt="" />
            <h2>Transactions</h2>
          </button>
        </div>
      </section>

      <!--Latest payment  -->
      <section id="latest-payment" class="w-11/12 mx-auto py-4 hidden">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Latest Payment</h1>
          </div>
          <div>
            <button class="btn text-neutral/50 bg-soft">View All</button>
          </div>
        </div>
        <!-- options  -->
        <div class="options space-y-2 flex flex-col mx-3">
          <!-- button 1 -->
          <button
            class="btn h-auto w-[100%] bg-primary-content flex justify-between"
          >
            <div class="flex gap-3 p-3 items-center">
              <div>
                <img
                  src="./assets/opt-1.png"
                  alt=""
                  class="bg-base-100 rounded-full p-[10px]"
                />
              </div>
              <div class="felx flex-col">
                <h1 class="text-xl">Electricity Bill</h1>
                <p class="text-neutral/50 text-left">Today 01:44 AM</p>
              </div>
            </div>
            <div>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </button>
          <!-- button 2 -->
          <button
            class="btn h-auto w-[100%] bg-primary-content flex justify-between"
          >
            <div class="flex gap-3 p-3 items-center">
              <div>
                <img
                  src="./assets/opt-1.png"
                  alt=""
                  class="bg-base-100 rounded-full p-[10px]"
                />
              </div>
              <div class="felx flex-col">
                <h1 class="text-xl">Bank Deposit</h1>
                <p class="text-neutral/50 text-left">Today 02:20 AM</p>
              </div>
            </div>
            <div>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </button>

          <!-- button 3 -->
          <button
            class="btn h-auto w-[100%] bg-primary-content flex justify-between"
          >
            <div class="flex gap-3 p-3 items-center">
              <div>
                <img
                  src="./assets/opt-1.png"
                  alt=""
                  class="bg-base-100 rounded-full p-[10px]"
                />
              </div>
              <div class="felx flex-col">
                <h1 class="text-xl">Mobile Recharge</h1>
                <p class="text-neutral/50 text-left">Today 02:44 AM</p>
              </div>
            </div>
            <div>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </button>

          <!-- button 4 -->
          <button
            class="btn h-auto w-[100%] bg-primary-content flex justify-between"
          >
            <div class="flex gap-3 p-3 items-center">
              <div>
                <img
                  src="./assets/opt-1.png"
                  alt=""
                  class="bg-base-100 rounded-full p-[10px]"
                />
              </div>
              <div class="felx flex-col">
                <h1 class="text-xl">Gas Bill</h1>
                <p class="text-neutral/50 text-left">Today 03:44 AM</p>
              </div>
            </div>
            <div>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </button>
        </div>
      </section>
      <!-- end of Latest payment section -->

      <!-- cash out section  -->
      <section id="cash-out" class="w-11/12 mx-auto pb-4 hidden">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Cash Out</h1>
          </div>
        </div>
        <div class="options">
          <div class="form pt-5 rounded-3xl">
            <div
              class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto"
            >
              <div class="card-body">
                <fieldset class="fieldset">
                  <!-- agent number  -->
                  <label class="label text-[16px] font-bold text-black"
                    >Agent Number</label
                  >
                  <input
                    id="agent-number"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 11 digit number"
                    maxlength="11"
                    minlength="11"
                  />

                  <!-- amount  -->

                  <label class="label text-[16px] font-bold text-black"
                    >Amount</label
                  >
                  <input
                    id="amount"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter amount to withdraw"
                  />

                  <!-- 4 Digit Pin -->
                  <label class="label text-[16px] font-bold text-black"
                    >4 Digit Pin</label
                  >
                  <input
                    id="pin"
                    type="password"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 4 Digit Pin"
                    maxlength="4"
                    minlength="4"
                  />
                  <button
                    id="btn-cashOut"
                    class="btn btn-primary mt-4 rounded-full text-[16px]"
                  >
                    Withdraw Money
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!--End of cash out section  -->

      <!-- Transfer money  -->
       <section id="send-money" class="w-11/12 mx-auto pb-4 hidden ">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Transfer Money</h1>
          </div>
        </div>
        <div class="options">
          <div class="form pt-5 rounded-3xl">
            <div
              class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto"
            >
              <div class="card-body">
                <fieldset class="fieldset">
                  <!-- agent number  -->
                  <label class="label text-[16px] font-bold text-black"
                    >User Account Number</label
                  >
                  <input
                    id="agent-number"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 11 digit number"
                    maxlength="16"
                    minlength="12"
                  />

                  <!-- amount  -->

                  <label class="label text-[16px] font-bold text-black"
                    >Amount</label
                  >
                  <input
                    id="amount"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter amount to transfer"
                  />

                  <!-- 4 Digit Pin -->
                  <label class="label text-[16px] font-bold text-black"
                    >4 Digit Pin</label
                  >
                  <input
                    id="send-pin"
                    type="password"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 4 Digit Pin"
                    maxlength="4"
                    minlength="4"
                  />
                  <button
                    id="btn-cashOut"
                    class="btn btn-primary mt-4 rounded-full text-[16px]"
                  >
                    Withdraw Money
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Add money  -->
      <section id="add-money" class="w-11/12 mx-auto pb-4 hidden">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Add Money</h1>
          </div>
        </div>
        <div class="options">
          <div class="form pt-5 rounded-3xl">
            <div
              class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto"
            >
              <div class="card-body">
                <fieldset class="fieldset">
                  <!-- select bank  -->
                  <label class="label text-[16px] font-bold text-black"
                    >Select A Bank</label
                  >
                  <select
                    id="add-money-bank"
                    class="select w-full bg-base-200 rounded-full text-neutral/50"
                  >
                    <option disabled selected>Select back</option>
                    <option>Dutch-Bangla Bank Limited</option>
                    <option>Islami Bank Bangladesh Limited</option>
                    <option>City Bank</option>
                    <option>AEastern Bank Limited</option>
                    <option>Eastern Bank Limited</option>
                  </select>

                  <!-- Bank Account Number  -->

                  <label class="label text-[16px] font-bold text-black"
                    >Bank Account Number</label
                  >
                  <input
                    id="account-number"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter the account number"
                    maxlength="16"
                    minlength="12"
                  />

                  <!-- Amount to Add -->
                  <label class="label text-[16px] font-bold text-black"
                    >Amount to Add</label
                  >
                  <input
                    id="add-money-amount"
                    type="number"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter Amount"
                  />

                  <!-- Pin Number -->
                  <label class="label text-[16px] font-bold text-black"
                    >Pin Number</label
                  >
                  <input
                    id="add-pin"
                    type="password"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 4 Digit Pin"
                    maxlength="4"
                    minlength="4"
                  />
                  <button
                    id="btn-addMoney"
                    class="btn btn-primary mt-4 rounded-full text-[16px]"
                  >
                    Add Money
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- end of add money section  -->

      <!-- get bonus  -->
       <section id="bonus" class="w-11/12 mx-auto pb-4 hidden">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Get Bonus</h1>
          </div>
        </div>
        <div class="options">
          <div class="form pt-5 rounded-3xl">
            <div
              class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto"
            >
              <div class="card-body">
                <fieldset class="fieldset">

                  <label class="label text-[16px] font-bold text-black"
                    >Enter Bonus Coupon</label
                  >
                  <input
                    id="account-number"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter your coupon"
                
                  />
                  
                  <button
                    id="bonus-btn"
                    class="btn btn-primary mt-4 rounded-full text-[16px]"
                  >
                    Get Bonus
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- pay bill section  -->
<section id="pay-bill" class="w-11/12 mx-auto pb-4 hidden">
        <div class="payment flex justify-between">
          <div>
            <h1 class="text-xl px-4 font-bold">Pay Bill</h1>
          </div>
        </div>
        <div class="options">
          <div class="form pt-5 rounded-3xl">
            <div
              class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto"
            >
              <div class="card-body">
                <fieldset class="fieldset">
                  <!-- select bank  -->
                  <label class="label text-[16px] font-bold text-black"
                    >Select To Pay</label
                  >
                  <select
                    id="add-money-bank"
                    class="select w-full bg-base-200 rounded-full text-neutral/50"
                  >
                    <option disabled selected>Select back</option>
                    <option>Dutch-Bangla Bank Limited</option>
                    <option>Islami Bank Bangladesh Limited</option>
                    <option>City Bank</option>
                    <option>AEastern Bank Limited</option>
                    <option>Eastern Bank Limited</option>
                  </select>

                  <!-- Bank Account Number  -->

                  <label class="label text-[16px] font-bold text-black"
                    >Biller Account Number</label
                  >
                  <input
                    id="account-number"
                    type="text"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter account number"
                    maxlength="16"
                    minlength="12"
                  />

                  <!-- Amount to Add -->
                  <label class="label text-[16px] font-bold text-black"
                    >Amount to Pay</label
                  >
                  <input
                    id="add-money-amount"
                    type="number"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter Amount"
                  />

                  <!-- Pin Number -->
                  <label class="label text-[16px] font-bold text-black"
                    >Pin Number</label
                  >
                  <input
                    id="pay-pin"
                    type="password"
                    class="input bg-base-200 rounded-full"
                    placeholder="Enter 4 Digit Pin"
                    maxlength="4"
                    minlength="4"
                  />
                  <button
                    id="btn-addMoney"
                    class="btn btn-primary mt-4 rounded-full text-[16px]"
                  >
                    Pay Now
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- End of pay bill  -->

      <!-- Transaction History section  -->
        <section id="transaction" class="w-11/12 mx-auto pb-4 hidden">
          <h1 class="text-2xl px-4 font-bold my-5">Transaction History</h1>
          <div id="transaction-container" class=" bg-base-100 p-5 mx-4">
            <!-- <div class=" transaction-card p-5 bg-base-100">

          </div> -->
          </div>
          
       
        
      </section>
      <!--End of Transaction section  -->

    </main>

    <!-- js links  -->
    <script src="./scripts/machine.js"></script>
    <script src="./scripts/AddMoney.js"></script>
    <script src="./scripts/cashOut.js"></script>
  </body>
</html>
